<!DOCTYPE html>
<html class="light" lang="id">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Masuk ke ANTREE - Antrean Cerdas Rumah Sakit</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#004482",
                        "on-primary": "#ffffff",
                        "surface": "#f9f9ff",
                        "surface-container": "#e7eeff",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#111c2d",
                        "on-surface-variant": "#414751",
                        "outline-variant": "#c1c6d3",
                        "secondary": "#006d37",
                        "secondary-container": "#6bfe9c",
                        "primary-container": "#005cab",
                        "outline": "#727783",
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-surface text-on-surface min-h-screen flex flex-col font-sans">

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="w-full max-w-[480px] bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm p-10">
            <div class="mb-8 text-center">
                <h2 class="text-2xl font-bold text-primary mb-2">ANTREE</h2>
                <h2 class="text-2xl font-bold text-on-surface">Selamat Datang Kembali!</h2>
                <p class="text-on-surface-variant text-sm">Masuk untuk melanjutkan antrean Anda.</p>
            </div>

            <form id="loginForm" class="flex flex-col gap-6">
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-on-surface" for="email">Email</label>
                    <input class="w-full px-4 py-3 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary outline-none" id="email" placeholder="contoh@email.com" type="text" required />
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-on-surface" for="password">Kata Sandi</label>
                    <input class="w-full px-4 py-3 border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary outline-none" id="password" placeholder="••••••••" type="password" required />
                </div>

                <button class="w-full py-4 bg-primary text-on-primary rounded-lg font-bold hover:bg-primary-container transition-all" type="submit" id="btnMasuk">
                    Masuk
                </button>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const dataLogin = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            const btn = document.getElementById('btnMasuk');
            btn.innerHTML = 'Mengecek...';
            btn.disabled = true;

            // 1. Coba login sebagai Admin terlebih dahulu
            fetch('https://antree-production.up.railway.app/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataLogin)
            })
            .then(response => {
                // Jika statusnya 200 OK, berarti dia Admin
                if (response.ok) {
                    return response.json().then(data => ({ role: 'admin', data }));
                }
                
                // 2. Jika gagal (bukan admin), coba login ke API User baru kita
                return fetch('https://antree-production.up.railway.app/api/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataLogin)
                }).then(res => {
                    if (!res.ok) throw new Error('Email atau Password salah!');
                    return res.json().then(data => ({ role: 'user', data }));
                });
            })
            .then(result => {
                if (result.role === 'admin') {
                    alert('Login Admin Berhasil!');
                    localStorage.setItem('admin_aktif', JSON.stringify(result.data));
                    window.location.href = 'admin.html'; 
                } else {
                    alert('Login User Berhasil!');
                    localStorage.setItem('user_aktif', JSON.stringify(result.data));
                    window.location.href = 'dashboard.html'; // <--- Ganti dengan nama file halaman utama user Anda
                }
            })
            .catch(error => {
                alert(error.message);
                btn.innerHTML = 'Masuk';
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
